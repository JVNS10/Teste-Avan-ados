<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script><script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script><style>
body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; }
canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: 2; }
video { position: absolute; width: 100vw; height: 100vh; object-fit: cover; filter: brightness(0.3) contrast(1.2); }
.ui { position: absolute; bottom: 20px; color: #0f0; z-index: 3; font-family: monospace; text-shadow: 0 0 5px #0f0; }
</style></head><body><video id="v"></video><canvas id="c"></canvas><div class="ui">SISTEMA DE RASTREAMENTO ATIVO</div>
<script>const v=document.getElementById('v'), c=document.getElementById('c'), ctx=c.getContext('2d');
const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
pose.setOptions({modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5});
pose.onResults((r) => { ctx.clearRect(0,0,c.width,c.height); if(!r.poseLandmarks) return;
drawConnectors(ctx, r.poseLandmarks, POSE_CONNECTIONS, {color: '#0f0', lineWidth: 2});
drawLandmarks(ctx, r.poseLandmarks, {color: '#fff', lineWidth: 1, radius: 2}); });
const cam = new Camera(v, {onFrame: async () => { c.width=v.videoWidth; c.height=v.videoHeight; await pose.send({image: v}); }});
cam.start();</script></body></html>
