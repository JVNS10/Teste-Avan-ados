<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><style>
body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
video { position: fixed; width: 100%; height: 100%; object-fit: cover; filter: grayscale(1) brightness(0.4); }
.scan { position: absolute; width: 100%; height: 2px; background: #0f0; box-shadow: 0 0 15px #0f0; animation: s 4s infinite; z-index: 2; }
.ui { position: relative; z-index: 3; display: flex; align-items: center; justify-content: center; height: 100vh; perspective: 1000px; }
.glass { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); padding: 40px; border-radius: 25px;
backdrop-filter: blur(15px); text-align: center; transition: 0.1s; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
button { background: #0f0; color: #000; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; }
@keyframes s { 0%, 100% { top: 0; } 50% { top: 100%; } } </style></head>
<body><video id="v" autoplay playsinline></video><div class="scan"></div>
<div class="ui"><div class="glass" id="g"><h1>SISTEMA ATIVO</h1><p id="m">AGUARDANDO ESCANEAMENTO</p>
<button onclick="init()">AUTENTICAR</button></div></div><script>
const v=document.getElementById('v'), g=document.getElementById('g'), m=document.getElementById('m');
async function init() {
try { v.srcObject = await navigator.mediaDevices.getUserMedia({video: {facingMode: "user"}});
navigator.vibrate([100, 50, 100]); m.innerText = "ACESSO CONCEDIDO"; g.style.borderColor = "#0f0";
} catch(e) { m.innerText = "ERRO DE HARDWARE"; } }
window.addEventListener('deviceorientation', (e) => {
g.style.transform = `rotateX(${-e.beta/12}deg) rotateY(${e.gamma/12}deg)`; });
</script></body></html>
