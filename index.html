<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic"></script><script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script><style>
body { margin:0; background:#000; overflow:hidden; font-family:monospace; }
video, canvas { position:absolute; width:100vw; height:100vh; object-fit:cover; transform:scaleX(-1); }
video { filter: brightness(0.2) contrast(1.5) grayscale(1); opacity: 0.6; }
.hud { position:absolute; z-index:10; width:100%; height:100%; display:flex; align-items:center; justify-content:center; perspective:1000px; transition:0.5s; }
.glass { background:rgba(0,255,0,0.05); border:1px solid #0f0; padding:30px; border-radius:15px; backdrop-filter:blur(10px); text-align:center; color:#0f0; }
.hide { opacity:0; pointer-events:none; transform: scale(1.5); }
button { background:#0f0; color:#000; border:none; padding:15px 30px; font-weight:900; cursor:pointer; text-transform:uppercase; }
</style></head><body><video id="v"></video><canvas id="c"></canvas>
<div class="hud" id="h"><div class="glass" id="g"><h1>SISTEMA V6</h1><p>OTIMIZAÇÃO DE FPS ATIVA</p><button onclick="start()">CONECTAR</button></div></div>
<script>const v=document.getElementById('v'), c=document.getElementById('c'), ctx=c.getContext('2d'), h=document.getElementById('h');
const hol = new Holistic({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${f}`});
hol.setOptions({modelComplexity: 0, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5});
hol.onResults((r) => { ctx.save(); ctx.clearRect(0,0,c.width,c.height); 
if(r.poseLandmarks) drawConnectors(ctx, r.poseLandmarks, POSE_CONNECTIONS, {color:'#0f0', lineWidth:2});
if(r.faceLandmarks) drawConnectors(ctx, r.faceLandmarks, FACEMESH_TESSELATION, {color:'#0f0', lineWidth:0.5});
if(r.leftHandLandmarks) drawConnectors(ctx, r.leftHandLandmarks, HAND_CONNECTIONS, {color:'#fff', lineWidth:3});
if(r.rightHandLandmarks) drawConnectors(ctx, r.rightHandLandmarks, HAND_CONNECTIONS, {color:'#fff', lineWidth:3});
ctx.restore(); });
async function start() { h.classList.add('hide'); navigator.vibrate(50);
const cam = new Camera(v, {onFrame: async () => { c.width=v.videoWidth; c.height=v.videoHeight; await hol.send({image:v}); }, width: 640, height: 480}); cam.start(); }
</script></body></html>
