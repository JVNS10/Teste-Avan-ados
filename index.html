<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script><script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script><style>
body { margin:0; background:#000; overflow:hidden; font-family:monospace; color:#0f0; }
video, canvas { position:absolute; width:100vw; height:100vh; object-fit:cover; }
video { filter: brightness(0.2) contrast(1.5) grayscale(1); }
.hud { position:absolute; z-index:10; width:100%; height:100%; display:flex; align-items:center; justify-content:center; perspective:1000px; transition:0.8s; }
.glass { background:rgba(0,255,0,0.05); border:1px solid rgba(0,255,0,0.3); padding:30px; border-radius:20px; backdrop-filter:blur(10px); text-align:center; transition:0.1s; pointer-events:auto; }
.scan-line { position:absolute; width:100%; height:2px; background:#0f0; box-shadow:0 0 15px #0f0; animation:s 3s infinite; z-index:5; }
.hide { opacity:0; transform:scale(0.5) translateZ(-500px); pointer-events:none; }
button { background:#0f0; color:#000; border:none; padding:10px 20px; font-weight:bold; cursor:pointer; margin-top:10px; }
@keyframes s { 0%,100%{top:0} 50%{top:100%} } </style></head><body>
<video id="v"></video><canvas id="c"></canvas><div class="scan-line"></div>
<div class="hud" id="h"><div class="glass" id="g"><h2>SISTEMA HUD</h2><p>AUTENTICAÇÃO PENDENTE</p><button onclick="start()">RASTREAR</button></div></div>
<script>const v=document.getElementById('v'), c=document.getElementById('c'), ctx=c.getContext('2d'), g=document.getElementById('g'), h=document.getElementById('h');
const pose = new Pose({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`});
pose.setOptions({modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5});
pose.onResults((r) => { ctx.clearRect(0,0,c.width,c.height); if(!r.poseLandmarks) return;
drawConnectors(ctx, r.poseLandmarks, POSE_CONNECTIONS, {color:'#0f0', lineWidth:2});
drawLandmarks(ctx, r.poseLandmarks, {color:'#fff', radius:1}); });
async function start() { h.classList.add('hide'); navigator.vibrate([100, 50, 100]);
const cam = new Camera(v, {onFrame: async () => { c.width=v.videoWidth; c.height=v.videoHeight; await pose.send({image:v}); }}); cam.start(); }
window.addEventListener('deviceorientation', (e) => { g.style.transform = `rotateX(${-e.beta/15}deg) rotateY(${e.gamma/15}deg)`; });
</script></body></html>
